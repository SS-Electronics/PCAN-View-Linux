name: CI

# Build, test, document, package (.deb), lint, and run an install test.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, test & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkgconf libgtk-3-dev libglib2.0-dev \
            doxygen graphviz xvfb can-utils

      - name: Build (release)
        run: make

      - name: Version smoke test
        run: ./build/pcan-view --version

      - name: Headless GUI smoke test
        run: |
          xvfb-run -a bash -c '
            ./build/pcan-view & PID=$!
            sleep 6
            if kill -0 "$PID" 2>/dev/null; then
              echo "GUI stayed up"; kill "$PID"; wait "$PID" 2>/dev/null || true
            else
              echo "GUI exited prematurely"; exit 1
            fi'

      - name: Build documentation (Doxygen)
        run: |
          make docs
          test -f docs/index.html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: docs/

  package:
    name: Debian package & install test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkgconf libgtk-3-dev libglib2.0-dev \
            debhelper devscripts lintian

      - name: Build binary .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          mv ../pcan-view_*_*.deb dist/ 2>/dev/null || true
          ls -l dist

      - name: Lint package
        run: lintian dist/pcan-view_*_*.deb || true

      - name: Install test
        run: |
          sudo apt-get install -y ./dist/pcan-view_*_*.deb
          command -v pcan-view
          pcan-view --version
          dpkg -L pcan-view | grep -E 'bin/pcan-view|pcan-view.desktop|pcan-view.png|pcan-view.1'

      - name: Removal test
        run: sudo apt-get purge -y pcan-view

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcan-view-deb
          path: dist/*.deb
